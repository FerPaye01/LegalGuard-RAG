name: Build and Deploy to Azure App Service (Docker)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_NAME: aclgalguardprod
  IMAGE_NAME: legalguard-rag
  APP_NAME: legal-guard-rag # Debe ser legal-guard-rag

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Azure Container Registry Login
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Usamos el nombre del ACR que creaste: aclgalguardprod
          tags: |
            aclgalguardprod.azurecr.io/legalguard-rag:latest
            aclgalguardprod.azurecr.io/legalguard-rag:${{ github.sha }}
          # ❌ ELIMINAR LAS LÍNEAS DE cache-from Y cache-to QUE ESTÁN DANDO ERROR

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App for Containers
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.APP_NAME }}
          images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
